version: '3.9'

services:
  # Schema manager service (requires external PostgreSQL database)
  schema-manager:
    build:
      context: ../..
      dockerfile: projects/genomicsdb-schema-manager/Dockerfile
    container_name: genomicsdb-schema-manager
    network_mode: host
    environment:
      DATABASE_URI: ${DATABASE_URI}
      SCHEMA_DEFS: ${SCHEMA_DEFS:-niagads.genomicsdb.schemas}
      PYTHONUNBUFFERED: "1"
    volumes:
      # Mount alembic versions for development
      - ./alembic/versions:/app/alembic/versions
