<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>GenomicsDB Schema Inspector</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}
			body {
				font-family:
					-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
					"Helvetica Neue", Arial, sans-serif;
				background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
				min-height: 100vh;
				display: flex;
				justify-content: center;
				align-items: center;
				padding: 20px;
			}
			.container {
				background: white;
				border-radius: 10px;
				box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
				padding: 40px;
				max-width: 600px;
				width: 100%;
			}
			h1 {
				color: #333;
				margin-bottom: 10px;
				font-size: 28px;
			}
			.subtitle {
				color: #666;
				margin-bottom: 30px;
				font-size: 14px;
			}
			.form-group {
				margin-bottom: 20px;
			}
			label {
				display: block;
				margin-bottom: 8px;
				color: #444;
				font-weight: 500;
				font-size: 14px;
			}
			select,
			input {
				width: 100%;
				padding: 12px;
				border: 2px solid #e0e0e0;
				border-radius: 6px;
				font-size: 14px;
				transition: border-color 0.3s;
			}
			select:focus,
			input:focus {
				outline: none;
				border-color: #667eea;
			}
			button {
				width: 100%;
				padding: 14px;
				background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
				color: white;
				border: none;
				border-radius: 6px;
				font-size: 16px;
				font-weight: 600;
				cursor: pointer;
				transition:
					transform 0.2s,
					box-shadow 0.2s;
			}
			button:hover {
				transform: translateY(-2px);
				box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
			}
			button:active {
				transform: translateY(0);
			}
			.info-box {
				background: #f0f4ff;
				border-left: 4px solid #667eea;
				padding: 12px;
				margin-bottom: 20px;
				border-radius: 4px;
				font-size: 13px;
				color: #555;
			}
			.loading {
				display: none;
				text-align: center;
				margin-top: 20px;
			}
			.spinner {
				border: 3px solid #f3f3f3;
				border-top: 3px solid #667eea;
				border-radius: 50%;
				width: 40px;
				height: 40px;
				animation: spin 1s linear infinite;
				margin: 0 auto;
			}
			@keyframes spin {
				0% {
					transform: rotate(0deg);
				}
				100% {
					transform: rotate(360deg);
				}
			}
		</style>
	</head>
	<body>
		<div class="container">
			<h1>GenomicsDB Schema Inspector</h1>
			<p class="subtitle">
				Query database tables by schema, table name, and run ID
			</p>

			<div class="info-box">
				Select a schema and table, optionally filter by run_id. Results
				are limited to 1000 rows.
			</div>

			<form id="inspectionForm" action="/inspect" method="post">
				<div class="form-group">
					<label for="schema_name">Schema:</label>
					<select id="schema_name" name="schema_name" required>
						<option value="">-- Select Schema --</option>
						{% for schema in schemas %}
						<option value="{{ schema }}">{{ schema }}</option>
						{% endfor %}
					</select>
				</div>

				<div class="form-group">
					<label for="table_name">Table:</label>
					<select id="table_name" name="table_name" required disabled>
						<option value="">-- Select Schema First --</option>
					</select>
				</div>

				<div class="form-group">
					<label for="run_id">Run ID (optional):</label>
					<input
						type="number"
						id="run_id"
						name="run_id"
						placeholder="Enter run ID to filter results"
					/>
				</div>

				<button type="submit">Inspect Table</button>
			</form>

			<div class="loading" id="loading">
				<div class="spinner"></div>
				<p style="margin-top: 10px; color: #666">Loading results...</p>
			</div>
		</div>

		<script>
			const schemasData = {{ schemas_data | tojson }};
			const schemaSelect = document.getElementById('schema_name');
			const tableSelect = document.getElementById('table_name');
			const form = document.getElementById('inspectionForm');
			const loading = document.getElementById('loading');

			schemaSelect.addEventListener('change', function() {
			    const selectedSchema = this.value;
			    tableSelect.innerHTML = '<option value="">-- Select Table --</option>';
			    tableSelect.disabled = !selectedSchema;

			    if (selectedSchema && schemasData[selectedSchema]) {
			        schemasData[selectedSchema].forEach(table => {
			            const option = document.createElement('option');
			            option.value = table;
			            option.textContent = table;
			            tableSelect.appendChild(option);
			        });
			    }
			});

			form.addEventListener('submit', function() {
			    loading.style.display = 'block';
			});
		</script>
	</body>
</html>
